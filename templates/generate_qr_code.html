<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate QR Code for Digital Restaurant Menu</title>
    <!-- Bootstrap CSS CDN-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

     <!--  Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a href="" class="navbar-brand">Generate QR code</a>
        </div>
    </nav>

    <!-- QR Code Form -->
     <div class="container mt-5" style="width: 600px; border: 1px solid #d3d3d3; padding: 30px; border-radius: 10px;"> <!-- margin 5 - mt-5 --> 
        <form action="{% url 'generate_qr_code' %}" method="post">
        {% csrf_token %} <!--When we are working with post method we need to pass this csrf token-->

        {{ form.as_p}} <!-- Form as paragraph-->
        <button type="submit" class="btn btn-primary"> Generate QR Code</button>
     </form>
     </div>
</body>
</html>
